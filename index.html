<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락처 등록 | Notion Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(118, 75, 162, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(102, 126, 234, 0.15) 0px, transparent 50%);
            overflow: hidden;
        }

        /* 배경 애니메이션 원 */
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: move 20s infinite alternate;
        }
        .circle-1 {
            width: 400px;
            height: 400px;
            background: rgba(102, 126, 234, 0.3);
            top: -100px;
            left: -100px;
        }
        .circle-2 {
            width: 300px;
            height: 300px;
            background: rgba(118, 75, 162, 0.3);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin: 20px;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: var(--text-color);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            box-shadow: 0 10px 15px -3px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            min-height: 20px;
            transition: all 0.3s;
        }

        .status-success { color: #4ade80; }
        .status-error { color: #f87171; }

        /* 로딩 애니메이션 */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="container">
        <h1>Connect to Notion</h1>
        <p class="subtitle">이름과 전화번호를 입력해주세요.</p>
        
        <form id="contactForm">
            <div class="input-group">
                <label for="name">이름</label>
                <input type="text" id="name" placeholder="홍길동" required>
            </div>
            
            <div class="input-group">
                <label for="phone">전화번호</label>
                <input type="tel" id="phone" placeholder="010-1234-5678" required>
            </div>
            
            <button type="submit" id="submitBtn">
                <span id="btnText">정보 전송하기</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div id="statusMsg" class="status-msg"></div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMsg');

        // 전화번호 자동 하이픈 (선택사항)
        document.getElementById('phone').addEventListener('input', (e) => {
            const val = e.target.value.replace(/[^0-9]/g, '');
            if (val.length <= 11) {
                let formatted = val;
                if (val.length > 3 && val.length <= 7) {
                    formatted = `${val.slice(0, 3)}-${val.slice(3)}`;
                } else if (val.length > 7) {
                    formatted = `${val.slice(0, 3)}-${val.slice(3, 7)}-${val.slice(7)}`;
                }
                e.target.value = formatted;
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;

            // UI 상태 변경
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            statusMsg.textContent = '';
            statusMsg.className = 'status-msg';

            try {
                // 로컬 서버로 데이터 전송 (포트 3000 사용 예정)
                const response = await fetch('http://localhost:3000/api/notion', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, phone }),
                });

                const result = await response.json();

                if (response.ok) {
                    statusMsg.textContent = '✅ 노션에 성공적으로 저장되었습니다!';
                    statusMsg.classList.add('status-success');
                    form.reset();
                } else {
                    throw new Error(result.message || '저장에 실패했습니다.');
                }
            } catch (error) {
                statusMsg.textContent = `❌ 오류: ${error.message}`;
                statusMsg.classList.add('status-error');
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
